---
services:
  uptime-kuma:
    image: "louislam/uptime-kuma:latest"
    container_name: "uptime-kuma"
    restart: "unless-stopped"
    env_file:
      - path: ".env"
        required: false
      - path: "stack.env"
        required: false
    environment:
      TZ: "${TZ:-UTC}"
      PUID: "${UPTIME_KUMA_PUID:-${PUID:-1000}}"
      PGID: "${UPTIME_KUMA_PGID:-${PGID:-1000}}"
    volumes:
      - "${BASE_DIR:-.}/data:/app/data"
    networks:
      - "uptime-kuma"
    deploy:
      resources:
        limits:
          cpus: "${UPTIME_KUMA_CPU_LIMIT:-${CPU_LIMIT:-0}}"
          memory: "${UPTIME_KUMA_MEM_LIMIT:-${MEM_LIMIT:-0}}"

networks:
  uptime-kuma:
    name: "uptime-kuma"
